[project]
name = "swecc-jwt"
version = "0.1.0"
description = "Shared JWT validation for SWECC services (server-issued member tokens)."
requires-python = ">=3.11"
dependencies = [
    "python-jose[cryptography]>=3.3",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["swecc_jwt"]
