name: Fix gateway DNS aliases

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Comma-separated services (default: server,sockets,bench-api)"
        required: false
        default: server,sockets,bench-api
        type: string

jobs:
  fix:
    name: Add swecc_stack_* aliases
    runs-on:
      group: EC2
      labels: [self-hosted, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Apply network aliases
        run: |
          chmod +x ./s/ops/ensure-gateway-dns.sh ./s/lib.sh
          IFS=',' read -ra SVCS <<< "${{ inputs.service }}"
          for s in "${SVCS[@]}"; do
            s="${s// /}"
            [[ -n "$s" ]] || continue
            ./s/ops/ensure-gateway-dns.sh "$s"
          done
