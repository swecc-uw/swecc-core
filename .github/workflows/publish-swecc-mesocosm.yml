name: Publish swecc-mesocosm to PyPI

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only fire when the release tag is prefixed for this package, so other
    # packages in this monorepo can have their own release workflows later.
    if: startsWith(github.event.release.tag_name, 'swecc-mesocosm-v')
    defaults:
      run:
        working-directory: packages/swecc-mesocosm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag version matches pyproject.toml
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#swecc-mesocosm-v}"
          pkg_version="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version ($tag_version) != pyproject.toml version ($pkg_version)"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
