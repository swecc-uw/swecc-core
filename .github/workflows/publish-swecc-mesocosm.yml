name: Publish swecc-mesocosm to PyPI

# Publish when package-related files land on main and version was bumped in
# pyproject.toml — no GitHub Release tag required. Manual run still available.

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/swecc-mesocosm/**'
      # Wheel bundles bench_common; CLI behavior follows common changes.
      - 'services/bench/common/**'
      - '.github/workflows/publish-swecc-mesocosm.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/swecc-mesocosm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decide whether to publish
        id: gate
        working-directory: ${{ github.workspace }}
        run: |
          pkg_version() {
            python -c 'import tomllib; print(tomllib.load(open("packages/swecc-mesocosm/pyproject.toml","rb"))["project"]["version"])'
          }

          NEW="$(pkg_version)"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — publishing $NEW"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "No prior SHA — publishing $NEW"
            exit 0
          fi

          if ! git cat-file -e "${BASE}:packages/swecc-mesocosm/pyproject.toml" 2>/dev/null; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "First publish of package on main — publishing $NEW"
            exit 0
          fi

          OLD="$(git show "${BASE}:packages/swecc-mesocosm/pyproject.toml" | python -c 'import sys,tomllib; print(tomllib.load(sys.stdin.buffer)["project"]["version"])')"
          if [ "$NEW" != "$OLD" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped $OLD -> $NEW — publishing"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Package paths changed but pyproject version is still $NEW — bump version in packages/swecc-mesocosm/pyproject.toml to publish to PyPI"
          fi

      - name: Install build tools
        if: steps.gate.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Stage bench_common for wheel
        if: steps.gate.outputs.should_publish == 'true'
        run: sh scripts/stage-bench-common.sh

      - name: Build package
        if: steps.gate.outputs.should_publish == 'true'
        run: python -m build --wheel

      - name: Publish to PyPI
        if: steps.gate.outputs.should_publish == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
