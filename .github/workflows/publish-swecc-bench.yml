name: Publish swecc-bench to PyPI

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'swecc-bench-v')
    defaults:
      run:
        working-directory: services/bench/common

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag version matches pyproject.toml
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#swecc-bench-v}"
          pkg_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version ($tag_version) != pyproject.toml version ($pkg_version)"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
