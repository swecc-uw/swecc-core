name: Reusable Deploy Workflow

# One deploy per service at a time on the shared self-hosted runner; cancel superseded runs.
concurrency:
  group: deploy-${{ inputs.service }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: "Service name (server, bot, ai, chronos, sockets, scheduler, bench-api, bench-sandbox, bench-worker). Used as the image tag and swarm service name."
      context:
        required: false
        type: string
        default: ""
        description: "Docker build context. Defaults to ./services/<service>. Override for grouped services (e.g. ./services/bench)."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
        description: "Dockerfile path, relative to context. Defaults to 'Dockerfile'."
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  SERVICE_NAME: ${{ inputs.service }}
  IMAGE: swecc-${{ inputs.service }}
  CONFIG_NAME: ${{ inputs.service }}_env
  NETWORK: prod_swecc-network

jobs:
  push_to_dockerhub:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve build context
        id: ctx
        run: |
          case "${{ inputs.service }}" in
            # Images COPY packages/swecc-jwt and paths under services/ — context must be repo root.
            bench-api)
              echo "context=." >> "$GITHUB_OUTPUT"
              echo "file=./services/bench/api/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            sockets)
              echo "context=." >> "$GITHUB_OUTPUT"
              echo "file=./services/sockets/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            bench-sandbox)
              echo "context=./services/bench" >> "$GITHUB_OUTPUT"
              echo "file=./services/bench/sandbox/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            bench-worker)
              echo "context=./services" >> "$GITHUB_OUTPUT"
              echo "file=./services/bench/worker/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            *)
              if [ -n "${{ inputs.context }}" ]; then
                echo "context=${{ inputs.context }}" >> "$GITHUB_OUTPUT"
                echo "file=${{ inputs.context }}/${{ inputs.dockerfile }}" >> "$GITHUB_OUTPUT"
              else
                echo "context=./services/${{ inputs.service }}" >> "$GITHUB_OUTPUT"
                echo "file=./services/${{ inputs.service }}/Dockerfile" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          file: ${{ steps.ctx.outputs.file }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}:${{ github.sha }}

  deploy_to_swarm:
    name: Deploy to Swarm
    needs: push_to_dockerhub
    timeout-minutes: 20
    runs-on:
      group: EC2
      labels: [self-hosted, deploy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE }}:latest

      - name: Deploy service
        timeout-minutes: 15
        env:
          DEPLOY_ROLLOUT_TIMEOUT_SEC: 600
        run: |
          chmod +x ./s/ops/deploy.sh ./s/lib.sh
          export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          ./s/ops/deploy.sh ${{ inputs.service }}
