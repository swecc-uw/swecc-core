name: Diagnose Bench LLM Keys

# Manual + PR runs on the swarm manager to compare Docker configs, service env,
# and LiteLLM Anthropic auth (no secret values logged).
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/diagnose-bench-llm-keys.yml'
      - 's/ops/diagnose-bench-llm-keys.sh'
      - 'services/bench/scripts/docker_test_anthropic.py'
      - 's/lib.sh'

concurrency:
  group: diagnose-bench-llm-keys
  cancel-in-progress: false

jobs:
  diagnose:
    name: Swarm vs LiteLLM probe
    runs-on:
      group: EC2
      labels: [self-hosted, deploy]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run swarm / LiteLLM diagnosis
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x ./s/ops/diagnose-bench-llm-keys.sh ./s/lib.sh
          ./s/ops/diagnose-bench-llm-keys.sh
