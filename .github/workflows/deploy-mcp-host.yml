name: Deploy MCP Host

on:
  push:
    branches: [main, master]
    paths:
      - 'services/mcp/host/**'
      - 'services/mcp/servers/**'
      - 's/ops/**'
      - 's/lib.sh'
      - '.github/workflows/deploy-mcp-host.yml'
      - '.github/workflows/reusable-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      service: mcp-host
      # Build context spans services/mcp/{host,servers}/* — the host
      # Dockerfile installs every package under servers/ via pip, so the
      # context has to be the whole services/ tree.
      context: ./services
      dockerfile: mcp/host/Dockerfile
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
