events {
    worker_connections 1024;
}

http {
    # Docker Compose embedded DNS resolver — short-name service lookups
    # (`bench-api`, …) only work if we resolve at runtime.
    resolver 127.0.0.11 ipv6=off valid=5s;

    upstream server {
        server swecc-server:8000;
    }

    upstream sockets {
        server swecc-sockets:8004;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health/ {
            proxy_pass http://server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoints
        location /ws {
            proxy_pass http://sockets;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        location /ws/ {
            proxy_pass http://sockets;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ── bench-api: http://localhost/bench/v1/... ───────────────────────
        # Mirrors the prod layout under api.swecc.org so the SPA can hit one
        # base URL in either environment. Strips /bench/ before forwarding.
        location /bench/v1/ws/ {
            set $upstream_bench swecc-bench-api;
            rewrite ^/bench/(.*)$ /$1 break;
            proxy_pass http://$upstream_bench:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        location /bench/ {
            set $upstream_bench swecc-bench-api;
            rewrite ^/bench/(.*)$ /$1 break;
            proxy_pass http://$upstream_bench:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600;
            proxy_send_timeout 600;
        }

        # API endpoints — Django server, catch-all (LAST)
        location / {
            proxy_pass http://server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
