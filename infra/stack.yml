# Production API gateway: Swarm service prod_nginx (global, :443).
# Deploy from repo root on the manager:
#   docker stack deploy -c infra/stack.yml prod
# Config changes require redeploy or updating the mounted nginx.conf on the host.

version: '3.8'

services:
  prod_nginx:
    image: nginx:stable-alpine
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /usr/share/nginx/html:/usr/share/nginx/html
      - ${PWD}/infra/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
    ports:
      - 80:80
      - 443:443
    networks:
      - prod_swecc-network

networks:
  prod_swecc-network:
    external: true

volumes:
  chronos_data:
  redis_data:
  rabbitmq_data:

configs:
  bot_env:
    external: true
  chronos_env:
    external: true
  scheduler_env:
    external: true
  server_env:
    external: true
  sockets_env:
    external: true
