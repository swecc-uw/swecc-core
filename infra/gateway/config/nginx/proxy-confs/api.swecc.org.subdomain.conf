server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.swecc.org;
    ssl_certificate /etc/letsencrypt/live/api.swecc.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.swecc.org/privkey.pem;
    include /config/nginx/ssl.conf;

    # ── sockets service: WebSocket endpoints under /ws ──────────────────────
    # WebSocket endpoint - exact match for /ws
    location = /ws {
        error_page 502 503 504 = @websocket_unavailable;

        proxy_pass http://swecc_stack_sockets:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_intercept_errors on;
    }

    # WebSocket endpoint - all paths under /ws/
    location /ws/ {
        error_page 502 503 504 = @websocket_unavailable;

        proxy_pass http://swecc_stack_sockets:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_intercept_errors on;
    }

    # Fallback when ws is down
    location @websocket_unavailable {
        default_type application/json;
        return 200 '{"status":"error","message":"WebSocket service unavailable"}';
    }

    # ── bench-api (BenchAnything FastAPI) ───────────────────────────────────
    # Public URLs:
    #   GET    https://api.swecc.org/bench/v1/domains
    #   POST   https://api.swecc.org/bench/v1/runs
    #   WS     wss://api.swecc.org/bench/v1/ws/episodes/{id}/trace
    #   GET    https://api.swecc.org/bench/docs   (FastAPI /docs)
    #
    # The trailing slash on `proxy_pass http://...:8000/;` is what strips the
    # `/bench/` prefix so bench-api still sees its own paths (/v1/..., /docs,
    # /health) unchanged. Don't drop it.

    # bench-api trace stream — needs Upgrade headers + long timeout + no
    # response buffering so the SPA gets events as they happen. Must come
    # BEFORE `location /bench/` so the longer prefix wins.
    location /bench/v1/ws/ {
        # Strip /bench/ before forwarding (preserves /v1/ws/... upstream).
        rewrite ^/bench/(.*)$ /$1 break;
        proxy_pass http://swecc_stack_bench-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location /bench/ {
        proxy_pass http://swecc_stack_bench-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-running benchmark POSTs (POST /v1/runs, /v1/test/episode) can
        # take well past nginx's default 60s read timeout to return.
        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }

    # ── mcp-host (Streamable HTTP gateway for services/mcp/servers/*) ──────
    # Public URL pattern:
    #   POST/GET https://api.swecc.org/mcp/<slug>/mcp
    # e.g. https://api.swecc.org/mcp/bench-anything/mcp
    #
    # Streamable HTTP multiplexes JSON-RPC POSTs and a long-lived SSE-style
    # GET stream over a single URL. nginx must NOT buffer the response or the
    # client never sees notifications until the upstream closes the stream.
    location /mcp/ {
        proxy_pass http://swecc_stack_mcp-host:8009/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP GETs hold the connection open for incremental events.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        chunked_transfer_encoding on;
    }

    # ── swecc-server (Django) — everything not claimed above ───────────────
    location / {
        proxy_pass http://swecc_stack_server:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.swecc.org;
    return 301 https://$host$request_uri;
}
