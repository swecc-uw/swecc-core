services:
  # =============================================================================
  # Infrastructure Services
  # =============================================================================
  db:
    image: postgres:13
    container_name: swecc-db-instance
    networks:
      - swecc-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-swecc}
      POSTGRES_USER: ${DB_USER:-swecc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-swecc_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-swecc} -d ${DB_NAME:-swecc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    build: ./infra/redis
    container_name: swecc-redis-instance
    networks:
      - swecc-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: swecc-rabbitmq-instance
    networks:
      - swecc-network
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 90s

  # =============================================================================
  # Application Services
  # =============================================================================
  server:
    build:
      context: ./services/server
      target: development
    container_name: swecc-server
    networks:
      - swecc-network
    volumes:
      - ./services/server:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=swecc-db-instance
      - REDIS_HOST=swecc-redis-instance
      - RABBIT_HOST=swecc-rabbitmq-instance
    command: >
      bash -c "cd server && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  sockets:
    build:
      context: .
      dockerfile: services/sockets/Dockerfile
    container_name: swecc-sockets
    networks:
      - swecc-network
    volumes:
      - ./services/sockets/app:/app/app
    ports:
      - "8004:8004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=swecc-db-instance
      - REDIS_HOST=swecc-redis-instance
      - RABBIT_HOST=swecc-rabbitmq-instance
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload

  chronos:
    build: ./services/chronos
    container_name: swecc-chronos
    networks:
      - swecc-network
    volumes:
      - ./services/chronos:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8002:8002"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  ai:
    build: ./services/ai
    container_name: swecc-ai
    networks:
      - swecc-network
    volumes:
      - ./services/ai/app:/app/app
    ports:
      - "8008:8008"
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RABBIT_HOST=swecc-rabbitmq-instance
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8008 --reload

  bot:
    build: ./services/bot
    container_name: swecc-bot
    networks:
      - swecc-network
    volumes:
      - ./services/bot:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      server:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBIT_HOST=swecc-rabbitmq-instance
      - SWECC_URL=http://swecc-server:8000

  # =============================================================================
  # Bench services (BenchAnything backend; UI lives in a separate repo)
  # =============================================================================
  bench-sandbox:
    build:
      context: ./services/bench
      dockerfile: sandbox/Dockerfile
    container_name: swecc-bench-sandbox
    networks:
      - swecc-network
    volumes:
      - bench_envs:/envs
    env_file:
      - .env
    environment:
      - SANDBOX_HOST=swecc-bench-sandbox
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bench-api:
    build:
      # Repo root context so the image can install packages/swecc-jwt and COPY
      # services/bench + services/server/server/bench/.
      context: .
      dockerfile: services/bench/api/Dockerfile
    container_name: swecc-bench-api
    networks:
      - swecc-network
    ports:
      - "${BENCH_API_PORT:-8010}:8000"
    volumes:
      - bench_data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      bench-sandbox:
        condition: service_healthy
      # swecc-server runs migrate on startup; bench-api needs the
      # bench_* tables to exist before it boots.
      server:
        condition: service_started
    env_file:
      - .env
    environment:
      - RABBIT_HOST=swecc-rabbitmq-instance
      - BENCH_RABBIT_USER=${BENCH_RABBIT_USER:-guest}
      - BENCH_RABBIT_PASS=${BENCH_RABBIT_PASS:-guest}
      - DB_HOST=swecc-db-instance
      - DB_NAME=${DB_NAME:-swecc}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-swecc}
      - DB_PASSWORD=${DB_PASSWORD:-swecc_dev_password}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      # Local dev without member/guest auth (open API). Do not use in production.
      # - BENCH_AUTH_DISABLED=1
      # Comma-separated domain IDs guests may run when allowlist is set; empty = all domains.
      # - ORCH_DEMO_DOMAIN_IDS=wordle,simple-trivia
      # Swagger/OpenAPI URLs when using nginx `http://localhost/bench/` (mesocosm default).
      # Set ORCH_GATEWAY_PREFIX= in .env if you only use direct :8010 (no nginx /bench/).
      - ORCH_GATEWAY_PREFIX=${ORCH_GATEWAY_PREFIX:-/bench}
      - ORCH_PUBLIC_BASE_URL=${ORCH_PUBLIC_BASE_URL:-}
      - ORCH_TRACE_DIR=/data/traces
      - ORCH_SANDBOX_URL=http://swecc-bench-sandbox:8001
      # LiteLLM expects GOOGLE_API_KEY for the gemini/* provider. The
      # rest of swecc-core (services/ai) uses GEMINI_API_KEY for the same
      # Google AI Studio key — fall back to it so a single key in .env covers
      # both services.
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-${GEMINI_API_KEY:-}}
      - REDIS_HOST=swecc-redis-instance
      - ORCH_MQ_ENABLED=${ORCH_MQ_ENABLED:-0}
      - ORCH_MQ_CONSUME_RUNS=${ORCH_MQ_CONSUME_RUNS:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bench-worker:
    build:
      context: ./services
      dockerfile: bench/worker/Dockerfile
    container_name: swecc-bench-worker
    networks:
      - swecc-network
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      bench-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RABBIT_HOST=swecc-rabbitmq-instance
      - BENCH_RABBIT_USER=${BENCH_RABBIT_USER:-guest}
      - BENCH_RABBIT_PASS=${BENCH_RABBIT_PASS:-guest}
      - ORCH_MQ_ENABLED=${ORCH_MQ_ENABLED:-0}
      - DB_HOST=swecc-db-instance
      - DB_NAME=${DB_NAME:-swecc}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-swecc}
      - DB_PASSWORD=${DB_PASSWORD:-swecc_dev_password}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_in_production}
      - WORKER_API_URL=http://swecc-bench-api:8000
      - WORKER_POLL_INTERVAL=${WORKER_POLL_INTERVAL:-10}
      # Must match BENCH_WORKER_TOKEN on bench-api when auth is enabled.
      - SWECC_BENCH_TOKEN=${BENCH_WORKER_TOKEN:-}
      # Same GEMINI_API_KEY → GOOGLE_API_KEY fallback as bench-api, so the
      # worker can call gemini/* models when its run_full_bench loop
      # eventually invokes litellm directly.
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-${GEMINI_API_KEY:-}}
    profiles:
      - bench-worker

  # Scheduler is optional for local dev (uncomment if needed)
  # scheduler:
  #   build:
  #     context: ./services/scheduler
  #     args:
  #       ENV: local
  #   container_name: swecc-scheduler
  #   networks:
  #     - swecc-network
  #   env_file:
  #     - .env
  #   environment:
  #     - DOCKER_NETWORK=swecc-network
  #     - SCHEDULER_BASE_URL=http://swecc-server:8000

  # =============================================================================
  # Reverse Proxy (optional for local dev)
  # =============================================================================
  nginx:
    image: nginx:stable-alpine
    container_name: swecc-nginx
    networks:
      - swecc-network
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - sockets
      # Optional in dev: nginx will 502 on /bench/ if bench-api isn't up, but
      # the rest of the gateway still works. depends_on is declarative, not a
      # strict ordering — services start in parallel.
      - bench-api
    profiles:
      - with-nginx

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  bench_data:
  bench_envs:

networks:
  swecc-network:
    name: swecc-network
    driver: bridge
